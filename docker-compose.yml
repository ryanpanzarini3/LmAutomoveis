services:
  postgres:
    image: postgres:16
    container_name: lm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lm_user
      POSTGRES_PASSWORD: lm_password_2026
      POSTGRES_DB: lm_automoveis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

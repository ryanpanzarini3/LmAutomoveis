<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - L&M Automóveis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" sizes="64x64" href="favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        secondary: '#06b6d4',
                        surface: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div class="min-h-screen">
        <header class="bg-slate-950 text-white">
            <div class="max-w-7xl mx-auto px-4 py-8 flex items-center justify-between gap-4">
                <div>
                    <p class="text-cyan-400 text-sm font-semibold uppercase tracking-[0.2em]">Painel interno</p>
                    <h1 class="font-display text-3xl font-bold">Cadastro de veículos</h1>
                </div>
                <div class="flex items-center gap-3">
                    <p id="session-badge" class="hidden text-sm text-white/70"></p>
                    <button id="logout-button" class="hidden px-5 py-3 rounded-xl border border-white/15 text-white font-semibold">Sair</button>
                    <a href="estoque.html" class="px-5 py-3 rounded-xl bg-cyan-400 text-slate-950 font-semibold">Ver estoque</a>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-10">
            <section id="login-panel" class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-6">
                <h2 class="font-display text-2xl font-bold text-primary mb-1">Acesso do operador</h2>
                <p class="text-sm text-slate-500 mb-6">Entre para cadastrar e remover veículos.</p>
                <form id="login-form" class="space-y-4">
                    <label class="block">
                        <span class="block text-sm font-medium mb-1">Usuário</span>
                        <input name="username" autocomplete="username" required class="w-full rounded-xl border border-slate-200 px-4 py-3">
                    </label>
                    <label class="block">
                        <span class="block text-sm font-medium mb-1">Senha</span>
                        <input name="password" type="password" autocomplete="current-password" required class="w-full rounded-xl border border-slate-200 px-4 py-3">
                    </label>
                    <button class="w-full rounded-2xl bg-slate-950 text-white font-semibold py-4 hover:bg-slate-800 transition-colors">Entrar</button>
                    <p id="login-status" class="text-sm text-slate-500"></p>
                </form>
            </section>

            <section id="admin-panel" class="hidden grid lg:grid-cols-[420px,1fr] gap-8">
            <section class="bg-white rounded-3xl shadow-lg p-6">
                <h2 class="font-display text-2xl font-bold text-primary mb-1">Novo veículo</h2>
                <p class="text-sm text-slate-500 mb-6">Use URLs das imagens por enquanto. Depois podemos trocar para upload.</p>

                <form id="vehicle-form" class="space-y-4">
                    <div class="grid sm:grid-cols-2 gap-4">
                        <label class="block">
                            <span class="block text-sm font-medium mb-1">Marca</span>
                            <input name="brand" required class="w-full rounded-xl border border-slate-200 px-4 py-3">
                        </label>
                        <label class="block">
                            <span class="block text-sm font-medium mb-1">Modelo</span>
                            <input name="model" required class="w-full rounded-xl border border-slate-200 px-4 py-3">
                        </label>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <label class="block">
                            <span class="block text-sm font-medium mb-1">Ano</span>
                            <input name="year" type="number" required class="w-full rounded-xl border border-slate-200 px-4 py-3">
                        </label>
                        <label class="block">
                            <span class="block text-sm font-medium mb-1">Preço</span>
                            <input name="price" type="number" required class="w-full rounded-xl border border-slate-200 px-4 py-3">
                        </label>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <label class="block">
                            <span class="block text-sm font-medium mb-1">KM</span>
                            <input name="km" type="number" class="w-full rounded-xl border border-slate-200 px-4 py-3">
                        </label>
                        <label class="block">
                            <span class="block text-sm font-medium mb-1">Tipo</span>
                            <select name="type" class="w-full rounded-xl border border-slate-200 px-4 py-3">
                                <option value="Carro">Carro</option>
                                <option value="Moto">Moto</option>
                            </select>
                        </label>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <label class="block"><span class="block text-sm font-medium mb-1">Combustível</span><input name="fuel" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                        <label class="block"><span class="block text-sm font-medium mb-1">Câmbio</span><input name="transmission" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <label class="block"><span class="block text-sm font-medium mb-1">Cor</span><input name="color" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                        <label class="block"><span class="block text-sm font-medium mb-1">Motor</span><input name="engine" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <label class="block"><span class="block text-sm font-medium mb-1">Potência</span><input name="power" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                        <label class="block"><span class="block text-sm font-medium mb-1">Portas</span><input name="doors" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <label class="block"><span class="block text-sm font-medium mb-1">Final da placa</span><input name="plate" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                        <label class="block"><span class="block text-sm font-medium mb-1">IPVA</span><input name="ipva" class="w-full rounded-xl border border-slate-200 px-4 py-3"></label>
                    </div>

                    <label class="block">
                        <span class="block text-sm font-medium mb-1">Selo do card</span>
                        <input name="badge" placeholder="DESTAQUE, NOVO, OFERTA..." class="w-full rounded-xl border border-slate-200 px-4 py-3">
                    </label>

                    <label class="block">
                        <span class="block text-sm font-medium mb-1">URLs das imagens</span>
                        <textarea name="images" rows="4" placeholder="Uma URL por linha" class="w-full rounded-xl border border-slate-200 px-4 py-3"></textarea>
                    </label>

                    <label class="block">
                        <span class="block text-sm font-medium mb-1">Equipamentos</span>
                        <textarea name="features" rows="4" placeholder="Um item por linha" class="w-full rounded-xl border border-slate-200 px-4 py-3"></textarea>
                    </label>

                    <label class="block">
                        <span class="block text-sm font-medium mb-1">Descrição</span>
                        <textarea name="description" rows="4" class="w-full rounded-xl border border-slate-200 px-4 py-3"></textarea>
                    </label>

                    <button class="w-full rounded-2xl bg-slate-950 text-white font-semibold py-4 hover:bg-slate-800 transition-colors">Salvar veículo</button>
                    <p id="form-status" class="text-sm text-slate-500"></p>
                </form>
            </section>

            <section class="space-y-4">
                <div class="flex items-center justify-between gap-4">
                    <div>
                        <h2 class="font-display text-2xl font-bold text-primary">Veículos cadastrados</h2>
                        <p class="text-sm text-slate-500">O estoque atual é importado automaticamente na primeira execução.</p>
                    </div>
                    <button id="refresh-button" class="px-5 py-3 rounded-xl bg-white border border-slate-200 font-semibold">Atualizar</button>
                </div>
                <div id="vehicle-list" class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
            </section>
            </section>
        </main>

        <script src="admin.js"></script>
    </div>
</body>
</html>
